<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            font-weight: 300;
        }
        .upload-area {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 50px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #888;
            background-color: #252525;
        }
        .upload-area p {
            margin: 0;
            color: #aaa;
            font-size: 1.1em;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background-color: #e0e0e0;
            color: #121212;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 600;
            width: 100%;
        }
        .btn:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Page</h1>
        <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-area" id="uploadArea">
                <p>Drag & Drop your PDF here<br>or click to browse</p>
                <input type="file" name="pdf_file" id="pdfFile" accept=".pdf">
            </div>
            <button type="submit" class="btn" id="submitBtn" disabled>Upload & Parse</button>
        </form>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('pdfFile');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('uploadForm');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateButtonState();
            }
        });

        fileInput.addEventListener('change', updateButtonState);

        function updateButtonState() {
            if (fileInput.files.length > 0) {
                submitBtn.disabled = false;
                uploadArea.querySelector('p').innerText = fileInput.files[0].name;
            } else {
                submitBtn.disabled = true;
                uploadArea.querySelector('p').innerHTML = 'Drag & Drop your PDF here<br>or click to browse';
            }
        }
    </script>
</body>
</html>
